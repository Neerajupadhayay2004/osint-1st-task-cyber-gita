services:
  - type: web
    name: cyber-gita-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: SHODAN_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./osint_platform.db
      - key: JWT_SECRET
        sync: false
